<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wbc-trophy.png" />
    <link rel="apple-touch-icon" href="/wbc-icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080f1e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WBC 2026" />
    <title>WBC 2026</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; overflow: hidden; background: #080f1e; }
    </style>
    <script>
      function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      }

      // Set immediately on load
      setAppHeight();

      // In standalone PWA mode on iOS, the layout settles after a short delay
      if (navigator.standalone) {
        setTimeout(setAppHeight, 100);
        setTimeout(setAppHeight, 300);
        setTimeout(setAppHeight, 600);
      }

      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', function() {
        setTimeout(setAppHeight, 200);
        setTimeout(setAppHeight, 500);
      });

      // Also re-measure when the page becomes visible (e.g. switching back to the app)
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          setTimeout(setAppHeight, 100);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
